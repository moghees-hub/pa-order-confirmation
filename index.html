<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome To Physique Academy</title>
<meta name="description" content="Your payment is confirmed. Complete your onboarding so your coach can be assigned and your programme can begin.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --green:#7FC838;
  --black:#0a0a0a;
  --white:#fff;
  --border:rgba(255,255,255,0.08);
}

body {
  font-family:'Inter', sans-serif;
  line-height:1.6;
  color:#fff;
  background:var(--black);
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}

/* SCROLL REVEAL */
[data-reveal]{opacity:0;transform:translateY(20px);transition:opacity .6s ease, transform .6s ease}
[data-reveal].visible{opacity:1;transform:none}

/* SINGLE BAR SECTION */
.bar{background:var(--black);padding:56px 0;position:relative;overflow:hidden}
.bar::before{content:'';position:absolute;top:-200px;left:50%;transform:translateX(-50%);width:900px;height:600px;background:radial-gradient(ellipse, rgba(127,200,56,0.08) 0%, transparent 60%);pointer-events:none}
.bar__inner{max-width:880px;margin:0 auto;padding:0 20px;position:relative;z-index:1;text-align:center}

.badge{display:inline-flex;align-items:center;gap:10px;background:rgba(127,200,56,0.1);border:1px solid rgba(127,200,56,0.25);color:var(--green);font-size:11px;font-weight:800;letter-spacing:.15em;text-transform:uppercase;padding:8px 20px;border-radius:30px;margin-bottom:22px}
.badge::before{content:'';width:7px;height:7px;background:var(--green);border-radius:50%;box-shadow:0 0 10px var(--green)}

h1{font-size:clamp(26px,4vw,40px);font-weight:900;line-height:1.1;letter-spacing:-.03em;color:#fff;margin-bottom:14px}
h1 em{font-style:normal;color:var(--green)}

.sub{font-size:16px;color:#bbb;font-weight:500;max-width:560px;margin:0 auto 36px;line-height:1.55}
.sub strong{color:#fff;font-weight:700}

.steps{display:flex;flex-direction:column;gap:12px;max-width:620px;margin:0 auto 26px;text-align:left}
.step{display:flex;align-items:center;gap:16px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;padding:16px 20px;transition:border-color .2s, background .2s}
.step:hover{border-color:rgba(127,200,56,0.35);background:rgba(127,200,56,0.04)}
.step__num{flex-shrink:0;width:32px;height:32px;border-radius:50%;background:var(--green);color:#000;font-weight:900;font-size:14px;display:flex;align-items:center;justify-content:center}
.step__text{font-size:15px;font-weight:600;color:#fff;letter-spacing:-.005em}

.note{max-width:620px;margin:0 auto 28px;background:rgba(127,200,56,0.08);border:1px solid rgba(127,200,56,0.35);border-left:4px solid var(--green);border-radius:10px;padding:18px 22px;font-size:16px;color:#fff;font-weight:700;line-height:1.5;text-align:left}
.note strong{color:var(--green);font-weight:900;text-transform:uppercase;letter-spacing:.02em;display:block;margin-top:4px;font-size:15px}

.scroll-cue{display:inline-flex;flex-direction:column;align-items:center;gap:10px;color:var(--green);font-size:12px;font-weight:800;letter-spacing:.15em;text-transform:uppercase;text-decoration:none;cursor:default}
.scroll-cue__arrow{width:34px;height:34px;border-radius:50%;background:rgba(127,200,56,0.12);border:1px solid rgba(127,200,56,0.35);display:flex;align-items:center;justify-content:center;animation:bounce 1.8s ease-in-out infinite}
.scroll-cue__arrow svg{width:14px;height:14px}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(6px)}}

@media (max-width:768px) {
  .bar{padding:44px 0}
  .step{padding:14px 16px;gap:14px}
  .step__num{width:28px;height:28px;font-size:13px}
  .step__text{font-size:14px}
}
</style>
</head>
<body>

<section class="bar">
  <div class="bar__inner">
    <div class="badge" data-reveal>Payment Confirmed</div>
    <h1 data-reveal>Welcome To <em>Physique Academy</em></h1>
    <p class="sub" data-reveal><strong>One last step</strong> before your coach is assigned.</p>

    <div class="steps">
      <div class="step" data-reveal>
        <div class="step__num">1</div>
        <div class="step__text">Sign &amp; submit your coaching agreement</div>
      </div>
      <div class="step" data-reveal>
        <div class="step__num">2</div>
        <div class="step__text">Complete your lifestyle &amp; onboarding questions</div>
      </div>
    </div>

    <p class="note" data-reveal>Scroll down to finish both steps. <strong>Your coach can't be assigned until this is done.</strong></p>

    <div class="scroll-cue" data-reveal>
      <span>Start Below</span>
      <div class="scroll-cue__arrow">
        <svg viewBox="0 0 24 24" fill="none" stroke="#7FC838" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
      </div>
    </div>
  </div>
</section>

<script>
(function(){
  var els = document.querySelectorAll('[data-reveal]');
  if (!('IntersectionObserver' in window)) {
    els.forEach(function(el){ el.classList.add('visible'); });
    return;
  }
  var io = new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if (e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); }
    });
  }, { threshold: 0.15 });
  els.forEach(function(el){ io.observe(el); });
})();
</script>

</body>
</html>
