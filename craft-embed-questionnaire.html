<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Override Craft CMS Width Constraints -->
<style>
.craft-content-wrapper,
.craft-field-wrapper,
.craft-redactor-field,
.craft-matrix-block,
.craft-entry-content,
.content-wrapper,
.field-wrapper,
.redactor-field,
.matrix-block,
.entry-content {
    max-width: none !important;
    width: 100% !important;
    margin: 0 !important;
    padding: 0 !important;
}

body .craft-content-wrapper *,
body .craft-field-wrapper *,
body .content-wrapper * {
    max-width: none !important;
}

.pa-questionnaire {
    width: 100vw !important;
    max-width: 100vw !important;
    margin-left: calc(-50vw + 50%) !important;
    margin-right: calc(-50vw + 50%) !important;
    position: relative !important;
}

.pa-questionnaire {
    font-family: 'Inter', sans-serif;
    line-height: 1.6;
    color: #fff;
    background: #0a0a0a;
    --green: #7FC838;
    --black: #0a0a0a;
    --white: #fff;
    --border: rgba(255,255,255,0.08);
}

.pa-questionnaire .bar,
.pa-questionnaire .bar *{
    box-sizing:border-box;
}

.pa-questionnaire [data-reveal]{opacity:0;transform:translateY(20px);transition:opacity .6s ease, transform .6s ease}
.pa-questionnaire [data-reveal].visible{opacity:1;transform:none}

.pa-questionnaire .bar{background:var(--black);padding:40px 0 36px;position:relative;overflow:hidden;margin:0}
.pa-questionnaire .bar::before{content:'';position:absolute;top:-200px;left:50%;transform:translateX(-50%);width:900px;height:600px;background:radial-gradient(ellipse, rgba(127,200,56,0.08) 0%, transparent 60%);pointer-events:none}
.pa-questionnaire .bar__inner{max-width:880px;margin:0 auto;padding:0 20px;position:relative;z-index:1;text-align:center}

.pa-questionnaire .badge{display:inline-flex;align-items:center;gap:8px;background:rgba(127,200,56,0.1);border:1px solid rgba(127,200,56,0.25);color:var(--green);font-size:10px;font-weight:800;letter-spacing:.15em;text-transform:uppercase;padding:6px 16px;border-radius:30px;margin:0 0 16px 0}
.pa-questionnaire .badge::before{content:'';width:6px;height:6px;background:var(--green);border-radius:50%;box-shadow:0 0 10px var(--green)}

.pa-questionnaire .bar h1{font-size:clamp(22px,3.2vw,32px);font-weight:900;line-height:1.15;letter-spacing:-.025em;color:#fff;margin:0 0 10px 0;padding:0}
.pa-questionnaire .bar h1 em{font-style:normal;color:var(--green)}

.pa-questionnaire .sub{font-size:15px;color:#bbb;font-weight:500;max-width:560px;margin:0 auto 20px;line-height:1.5;padding:0}
.pa-questionnaire .sub strong{color:#fff;font-weight:700}

.pa-questionnaire .note{max-width:560px;margin:0 auto;background:rgba(127,200,56,0.08);border:1px solid rgba(127,200,56,0.35);border-left:4px solid var(--green);border-radius:8px;padding:12px 18px;font-size:14px;color:#fff;font-weight:700;line-height:1.45;text-align:left}
.pa-questionnaire .note strong{color:var(--green);font-weight:900;text-transform:uppercase;letter-spacing:.02em;display:block;margin-top:2px;font-size:13px}

@media (max-width:768px) {
  .pa-questionnaire .bar{padding:32px 0 28px}
}
</style>

<div class="pa-questionnaire">

  <section class="bar">
    <div class="bar__inner">
      <div class="badge" data-reveal>Final Step</div>
      <h1 data-reveal>Tell Us <em>About You</em></h1>
      <p class="sub" data-reveal>The more your coach knows, the sharper your plan. <strong>Answer honestly.</strong></p>
      <p class="note" data-reveal>Complete every question below. <strong>Your coach is assigned once this is submitted.</strong></p>
    </div>
  </section>

</div>

<script>
(function(){
  var els = document.querySelectorAll('.pa-questionnaire [data-reveal]');
  if (!('IntersectionObserver' in window)) {
    els.forEach(function(el){ el.classList.add('visible'); });
    return;
  }
  var io = new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if (e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); }
    });
  }, { threshold: 0.15 });
  els.forEach(function(el){ io.observe(el); });
})();
</script>
